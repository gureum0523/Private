name: Update Stock Prices
 
'on':
  schedule:
    - cron: '0 23 * * 1-5'
  workflow_dispatch:
 
jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Install dependencies
        run: pip install "yfinance>=0.2.50" requests --quiet
 
      - name: Fetch prices and rates
        run: |
          python3 << 'EOF'
          import yfinance as yf
          import json
          import datetime
          import time
 
          US_TICKERS = ["VTI","GLDM","VOO","BRK-B","QQQM","AAPL","NVDA","EPI","TSLA","GOOGL"]
          KR_TICKERS = ["379800.KS","0046A0.KS","0060H0.KS","0072R0.KS","130680.KS","453870.KS","073240.KS"]
          FX_PAIRS   = ["USDKRW=X","SARKRW=X","JPYKRW=X"]
 
          def fetch_one(ticker):
              try:
                  t = yf.Ticker(ticker)
                  hist = t.history(period="5d", interval="1d")
                  if not hist.empty:
                      price = float(hist["Close"].dropna().iloc[-1])
                      print(f"  ✅ {ticker}: {price}")
                      return price
                  # fast_info fallback
                  info = t.fast_info
                  price = getattr(info, "last_price", None) or getattr(info, "regular_market_price", None)
                  if price:
                      print(f"  ✅ {ticker} (fast_info): {price}")
                      return float(price)
              except Exception as e:
                  print(f"  ❌ {ticker}: {e}")
              return None
 
          output = {
              "rates": { "USD": 1350, "SAR": 360, "JPY": 9.0 },
              "us": {},
              "kr": {},
              "updatedAt": datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          }
 
          print("=== 환율 ===")
          for pair, key in [("USDKRW=X","USD"),("SARKRW=X","SAR"),("JPYKRW=X","JPY")]:
              p = fetch_one(pair)
              if p: output["rates"][key] = round(p, 4)
              time.sleep(0.3)
 
          print("=== 미국 주식 ===")
          for t in US_TICKERS:
              p = fetch_one(t)
              key = "BRK.B" if t == "BRK-B" else t
              if p: output["us"][key] = round(p, 4)
              time.sleep(0.3)
 
          print("=== 한국 주식 ===")
          for t in KR_TICKERS:
              p = fetch_one(t)
              code = t.replace(".KS","")
              if p: output["kr"][code] = round(p, 0)
              time.sleep(0.3)
 
          with open("prices.json","w") as f:
              json.dump(output, f, ensure_ascii=False, indent=2)
 
          print("\n=== 최종 결과 ===")
          print(json.dumps(output, ensure_ascii=False, indent=2))
          EOF
 
      - name: Commit prices.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --cached --quiet || git commit -m "chore: update prices $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
