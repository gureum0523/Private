<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSI Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0b0f14;
  --surf1:    #111720;
  --surf2:    #161d27;
  --surf3:    #1c2535;
  --border:   #24303f;
  --border2:  #2e3d52;
  --text:     #dce8f5;
  --text2:    #7e9ab5;
  --text3:    #4a6070;
  --actual:   #4da6ff;
  --best:     #3ecf7a;
  --ml:       #f0b429;
  --worst:    #f05252;
  --tag-rac:  #7c5cfc;
  --tag-pac:  #0ba5b4;
  --tag-scac: #e06c2d;
  --tag-app:  #4da6ff;
  --tag-tot:  #7e9ab5;
  --font:     'Pretendard', 'IBM Plex Mono', sans-serif;
  --mono:     'IBM Plex Mono', monospace;
  --th-h:     36px;
  --row-h:    28px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── TOPBAR ── */
#topbar{
  display:flex;align-items:center;gap:14px;
  padding:0 20px;height:52px;
  background:var(--surf1);border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.brand{
  font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:2px;
  background:var(--actual);color:#000;padding:4px 9px;border-radius:2px;
}
.title-text{font-size:14px;font-weight:600;color:var(--text);letter-spacing:.3px}
.badge-actual{
  margin-left:auto;
  font-family:var(--mono);font-size:10px;
  background:rgba(77,166,255,.1);border:1px solid rgba(77,166,255,.25);
  color:var(--actual);padding:3px 10px;border-radius:2px;
}

/* ── TOOLBAR ── */
#toolbar{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  padding:8px 20px;
  background:var(--surf1);border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.tb-label{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.8px;white-space:nowrap}
.btn-group{display:flex;gap:2px}
.tb-btn{
  font-family:var(--mono);font-size:10px;padding:4px 11px;
  background:var(--surf2);border:1px solid var(--border2);color:var(--text2);
  cursor:pointer;transition:all .12s;white-space:nowrap;
}
.tb-btn:hover{color:var(--text);border-color:var(--actual)}
.tb-btn.on{background:var(--actual);border-color:var(--actual);color:#000;font-weight:600}
.scen-btn{
  font-family:var(--mono);font-size:10px;padding:4px 11px;
  border:1px solid;cursor:pointer;transition:all .12s;border-radius:2px;
}
.scen-btn[data-s="Best"]{border-color:var(--best);color:var(--best);background:transparent}
.scen-btn[data-s="Most Likely"]{border-color:var(--ml);color:var(--ml);background:transparent}
.scen-btn[data-s="Worst"]{border-color:var(--worst);color:var(--worst);background:transparent}
.scen-btn.on[data-s="Best"]{background:var(--best);color:#000}
.scen-btn.on[data-s="Most Likely"]{background:var(--ml);color:#000}
.scen-btn.on[data-s="Worst"]{background:var(--worst);color:#000}
.sep{width:1px;height:20px;background:var(--border2);flex-shrink:0}
/* metric checkboxes */
.chk-wrap{display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none}
.chk-wrap input{display:none}
.chk-box{
  width:14px;height:14px;border:1px solid var(--border2);
  background:var(--surf2);display:flex;align-items:center;justify-content:center;
  font-size:8px;color:var(--actual);transition:all .12s;flex-shrink:0;
}
.chk-wrap input:checked ~ .chk-box{background:var(--actual);border-color:var(--actual);color:#000}
.chk-wrap input:checked ~ .chk-box::after{content:'✓';font-weight:700}
.chk-label{font-family:var(--mono);font-size:10px;color:var(--text2)}

/* ── LEGEND ── */
#legend{
  display:flex;align-items:center;gap:16px;padding:5px 20px;
  background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;
}
.leg{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--text3)}
.leg-dot{width:7px;height:7px;border-radius:50%}
.leg-hint{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--text3)}

/* ── MAIN SCROLL ── */
#scroll-area{flex:1;overflow:auto;padding:16px 20px 40px}

/* ── SECTION BLOCK ── */
.section-block{margin-bottom:24px}
.section-hd{
  display:flex;align-items:center;gap:8px;
  padding:8px 14px;
  background:var(--surf2);border:1px solid var(--border);border-bottom:none;
  cursor:pointer;user-select:none;
}
.section-hd:hover{background:var(--surf3)}
.sec-tag{
  font-family:var(--mono);font-size:9px;font-weight:600;
  padding:2px 8px;border-radius:2px;letter-spacing:1px;text-transform:uppercase;
}
.sec-title{font-size:12px;font-weight:600;color:var(--text);letter-spacing:.3px}
.arrow{font-size:10px;color:var(--text3);transition:transform .2s;margin-left:auto}
.section-hd.collapsed .arrow{transform:rotate(-90deg)}

/* SUB-SECTION (B2C / B2B / Others inside Sell-thru) */
.sub-section{margin-bottom:0}
.sub-hd{
  display:flex;align-items:center;gap:6px;
  padding:6px 14px 6px 28px;
  background:var(--surf1);border-top:1px solid var(--border);
  cursor:pointer;user-select:none;
}
.sub-hd:hover{background:var(--surf2)}
.sub-tag{
  font-family:var(--mono);font-size:9px;font-weight:500;
  padding:1px 7px;border-radius:2px;letter-spacing:.8px;text-transform:uppercase;
  border:1px solid;
}
.sub-title{font-size:11px;font-weight:500;color:var(--text2)}
.sub-arrow{font-size:9px;color:var(--text3);transition:transform .2s;margin-left:auto}
.sub-hd.collapsed .sub-arrow{transform:rotate(-90deg)}

/* ── TABLE WRAPPER ── */
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-top:none}
.tbl-wrap.hidden{display:none}

/* ── TABLE ── */
table{
  width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px;
  table-layout:fixed;
}
/* Sticky first 2 cols */
col.col-group{width:80px}
col.col-cat{width:110px}
col.col-month{width:88px}

/* HEADER */
thead tr.hd-year th{
  background:var(--surf3);color:var(--text3);font-weight:400;font-size:9px;
  letter-spacing:.5px;text-align:center;padding:4px 6px;
  border-bottom:1px solid var(--border);border-right:1px solid var(--border);
  position:sticky;top:0;z-index:10;
}
thead tr.hd-year th.sticky-g{
  position:sticky;left:0;z-index:15;background:var(--surf3);text-align:left;
}
thead tr.hd-year th.sticky-c{
  position:sticky;left:80px;z-index:15;background:var(--surf3);text-align:left;
}
thead tr.hd-month th{
  background:var(--surf2);font-weight:500;font-size:10px;text-align:center;
  padding:5px 4px;border-bottom:2px solid var(--border2);border-right:1px solid var(--border);
  position:sticky;top:27px;z-index:10;white-space:nowrap;
}
thead tr.hd-month th.sticky-g{
  position:sticky;left:0;z-index:15;background:var(--surf2);text-align:left;padding-left:10px;
}
thead tr.hd-month th.sticky-c{
  position:sticky;left:80px;z-index:15;background:var(--surf2);text-align:left;padding-left:8px;
}
th.actual-h{color:var(--actual)}
th.future-h{color:var(--text3)}
th.yr-sep{border-left:2px solid var(--border2) !important}

/* BODY */
tbody tr{border-bottom:1px solid rgba(36,48,63,.7);transition:background .08s}
tbody tr:hover{background:rgba(77,166,255,.03)}

/* group + category sticky cells */
td.td-group{
  position:sticky;left:0;z-index:3;
  background:var(--surf1);
  font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;
  padding:0 6px 0 10px;border-right:1px solid var(--border);
  vertical-align:middle;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
td.td-cat{
  position:sticky;left:80px;z-index:3;
  background:var(--surf1);
  font-size:10px;color:var(--text2);
  padding:0 6px 0 8px;border-right:1px solid var(--border);
  vertical-align:middle;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
/* group color */
td.g-rac{color:var(--tag-rac)}
td.g-pac{color:var(--tag-pac)}
td.g-scac{color:var(--tag-scac)}
td.g-app{color:var(--tag-app)}
td.g-tot{color:var(--text);font-weight:700}
td.g-oth{color:var(--text3)}

/* total rows */
tr.row-total td.td-group,tr.row-total td.td-cat{background:rgba(77,166,255,.06)!important}
tr.row-total{background:rgba(77,166,255,.04)}
tr.row-total td{font-weight:600}

/* actual vs scenario rows */
tr.row-actual{}
tr.row-scen{opacity:.78}
tr.row-scen td.td-group,tr.row-scen td.td-cat{opacity:.7}

/* DATA CELLS */
td.dc{
  text-align:right;padding:0 8px;
  border-right:1px solid rgba(36,48,63,.6);
  vertical-align:middle;white-space:nowrap;
}
td.dc.yr-sep{border-left:2px solid var(--border2)}
.vact{color:var(--actual);font-weight:500}
.vbest{color:var(--best)}
.vml{color:var(--ml)}
.vwrst{color:var(--worst)}
.vempty{color:var(--border2)}

/* ROW HEIGHT via tr */
tr.row-actual td{height:28px;line-height:28px}
tr.row-scen td{height:24px;line-height:24px;font-size:10px}

/* EDITABLE INPUT */
.inp{
  background:transparent;border:none;outline:none;
  font-family:var(--mono);font-size:10px;
  width:100%;height:100%;text-align:right;
  padding:0 8px;cursor:text;color:var(--ml);
}
.inp::placeholder{color:var(--border2)}
.inp:focus{background:rgba(240,180,41,.07);color:var(--text)}
.inp.inp-best{color:var(--best)}
.inp.inp-best:focus{background:rgba(62,207,122,.07)}
.inp.inp-worst{color:var(--worst)}
.inp.inp-worst:focus{background:rgba(240,82,82,.07)}
.inp.inp-act{color:var(--ml)}
.inp.inp-act:focus{background:rgba(77,166,255,.07);color:var(--text)}
td.dc.editable{padding:0}

/* METRIC LABEL (tiny, left of group) */
.metric-chip{
  display:inline-block;font-family:var(--mono);font-size:8px;font-weight:500;
  padding:1px 5px;border-radius:1px;margin-left:4px;vertical-align:middle;opacity:.8;
}
.chip-cogs{background:rgba(77,166,255,.12);color:var(--actual)}
.chip-unit{background:rgba(62,207,122,.1);color:var(--best)}
.chip-set{background:rgba(240,180,41,.1);color:var(--ml)}

/* SCEN LABEL in cat col */
.scen-label{
  font-family:var(--mono);font-size:9px;padding:0 8px;color:var(--text3);
}

/* FOOTER */
#footer{
  display:flex;align-items:center;gap:12px;padding:8px 20px;
  border-top:1px solid var(--border);background:var(--surf1);flex-shrink:0;
}
.edit-count{font-family:var(--mono);font-size:10px;color:var(--text3)}
.act-btn{
  font-family:var(--mono);font-size:10px;font-weight:600;padding:5px 14px;
  cursor:pointer;transition:opacity .12s;border:none;
}
.act-btn:hover{opacity:.8}
.btn-export{background:var(--actual);color:#000}
.btn-reset{background:var(--surf2);border:1px solid var(--border2)!important;color:var(--text2)}

/* HIDE ROWS utility */
.hide{display:none!important}
</style>
</head>
<body>
<div id="app">

<!-- TOP BAR -->
<div id="topbar">
  <div class="brand">PSI</div>
  <span class="title-text">Sell-in / Sell-thru Dashboard</span>
  <div class="badge-actual" id="badgeActual">● Actual: 2025/01 – 2026/02</div>
</div>

<!-- TOOLBAR -->
<div id="toolbar">
  <span class="tb-label">VIEW</span>
  <div class="btn-group">
    <button class="tb-btn on" onclick="setTopView('all',this)">전체</button>
    <button class="tb-btn" onclick="setTopView('sellin',this)">Sell-in</button>
    <button class="tb-btn" onclick="setTopView('sellthru',this)">Sell-thru</button>
  </div>
  <div class="sep"></div>
  <span class="tb-label">SCENARIO</span>
  <div class="btn-group" style="gap:4px">
    <button class="scen-btn on" data-s="Best" onclick="toggleScen('Best',this)">Best</button>
    <button class="scen-btn on" data-s="Most Likely" onclick="toggleScen('Most Likely',this)">Most Likely</button>
    <button class="scen-btn on" data-s="Worst" onclick="toggleScen('Worst',this)">Worst</button>
  </div>
  <div class="sep"></div>
  <span class="tb-label">지표</span>
  <label class="chk-wrap"><input type="checkbox" id="chkCOGS" checked onchange="reRender()"><div class="chk-box"></div><span class="chk-label">COGS</span></label>
  <label class="chk-wrap"><input type="checkbox" id="chkUnit" checked onchange="reRender()"><div class="chk-box"></div><span class="chk-label">Qty(Unit)</span></label>
  <label class="chk-wrap"><input type="checkbox" id="chkSet" onchange="reRender()"><div class="chk-box"></div><span class="chk-label">Qty(Set)</span></label>
</div>

<!-- LEGEND -->
<div id="legend">
  <div class="leg"><div class="leg-dot" style="background:var(--actual)"></div>Actual 실적</div>
  <div class="leg"><div class="leg-dot" style="background:var(--best)"></div>Best</div>
  <div class="leg"><div class="leg-dot" style="background:var(--ml)"></div>Most Likely</div>
  <div class="leg"><div class="leg-dot" style="background:var(--worst)"></div>Worst</div>
  <div class="leg" style="gap:8px">
    <span style="color:var(--tag-rac);font-weight:700">RAC</span>
    <span style="color:var(--tag-pac);font-weight:700">PAC</span>
    <span style="color:var(--tag-scac);font-weight:700">SCAC</span>
    <span style="color:var(--tag-app);font-weight:700">Applied</span>
  </div>
  <div class="leg-hint">💡 미래 구간(2026/03~) Actual · 시나리오 직접 입력 가능</div>
  <div class="leg-hint" style="margin-left:0">단위: COGS = SAR(리얄) / Qty(Unit) = 대 / Qty(Set) = 세트</div>
</div>

<!-- SCROLL AREA -->
<div id="scroll-area"></div>

<!-- FOOTER -->
<div id="footer">
  <span class="edit-count" id="editCount">수정된 셀: 0개</span>
  <button class="act-btn btn-export" onclick="exportEdits()">📋 입력값 복사</button>
  <button class="act-btn btn-reset" onclick="resetEdits()">↺ 초기화</button>
</div>

</div><!-- #app -->

// STATE

const ACTUAL_MONTHS = new Set(RAW.actual_months);
const MONTHS = RAW.months;
const SCENARIOS = ['Best','Most Likely','Worst'];

let activeScenarios = new Set(['Best','Most Likely','Worst']);
let topView = 'all'; // all | sellin | sellthru
const edits = {};

function isActual(m){ return ACTUAL_MONTHS.has(m); }
function isFuture(m){ return !ACTUAL_MONTHS.has(m); }

// ============================================================
// FORMATTING
// ============================================================
function fmtCOGS(v){
  if(v===null||v===undefined) return null;
  // SAR, format with thousands separator, no decimal
  return Math.round(v).toLocaleString('en-US');
}
function fmtQty(v){
  if(v===null||v===undefined) return null;
  return Math.round(v).toLocaleString('en-US');
}
function fmt(v, metric){
  if(metric==='COGS') return fmtCOGS(v);
  return fmtQty(v);
}
function parseVal(s, metric){
  const n = parseFloat(s.replace(/,/g,''));
  return isNaN(n) ? null : n;
}

// ============================================================
// DATA ACCESS
// ============================================================
function dataKey(type,channel,group,category,metric){
  return `${type}|${channel}|${group}|${category}|${metric}`;
}
function getV(key, month, scenario){
  const ek = `${key}||${month}||${scenario}`;
  if(edits[ek]!==undefined) return edits[ek];
  return RAW.data[key]?.[month]?.[scenario] ?? null;
}
function setEdit(key, month, scenario, val){
  const ek = `${key}||${month}||${scenario}`;
  if(val===null){ delete edits[ek]; }
  else { edits[ek] = val; }
  document.getElementById('editCount').textContent = `수정된 셀: ${Object.keys(edits).length}개`;
}

// ============================================================
// HIERARCHY CONFIG
// ============================================================
const GROUP_ORDER = ['RAC','PAC','SCAC','Applied','Others','Grand'];
const GROUP_CATS = {
  'RAC':     ['Split Inverter','Split on/off','Window','Others','RAC Total'],
  'PAC':     ['PAC Total'],
  'SCAC':    ['Concealed','Cassette','Unitary Package','Others','SCAC Total'],
  'Applied': ['Applied Total'],
  'Others':  ['Others Total'],
  'Grand':   ['Total'],
};
// Which categories are "totals" (bold)
const TOTAL_CATS = new Set(['RAC Total','PAC Total','SCAC Total','Applied Total','Others Total','Total']);
// Group CSS class
function gCls(g){
  return {RAC:'g-rac',PAC:'g-pac',SCAC:'g-scac',Applied:'g-app',Others:'g-oth',Grand:'g-tot'}[g]||'';
}

const METRICS = [
  {id:'COGS', label:'COGS', chipCls:'chip-cogs', chkId:'chkCOGS'},

];

// ============================================================
// RENDER ENGINE
// ============================================================
function activeMetrics(){
  return METRICS.filter(m=>document.getElementById(m.chkId)?.checked);
}

function renderMonthHeaders(){
  const ams = MONTHS;
  let thYear='<th class="sticky-g" rowspan="2" style="min-width:80px">Group</th><th class="sticky-c" style="min-width:110px">Category</th><th style="position:sticky;left:190px;z-index:15;background:var(--surf3);min-width:80px">지표</th>';
  let thMonth='';
  let prevYear=null;
  ams.forEach((m,i)=>{
    const y=m.slice(0,4), mo=m.slice(4,6);
    const cls = isActual(m)?'actual-h':'future-h';
    const ysep = (prevYear&&y!==prevYear)?' yr-sep':'';
    prevYear=y;
    thMonth+=`<th class="${cls}${ysep}" data-m="${m}">${y}/${mo}</th>`;
  });
  // Year row
  let groups={};
  MONTHS.forEach(m=>{ const y=m.slice(0,4); groups[y]=(groups[y]||0)+1; });
  let first=true;
  Object.entries(groups).forEach(([y,cnt])=>{
    const sep=(!first)?' yr-sep':'';
    thYear+=`<th colspan="${cnt}" class="${sep}" style="text-align:center;letter-spacing:1px">${y}</th>`;
    first=false;
  });
  return {year:thYear, month:thMonth};
}

function renderTableHeader(){
  const {year,month}=renderMonthHeaders();
  return `<thead>
    <tr class="hd-year">${year}</tr>
    <tr class="hd-month"><th style="position:sticky;left:190px;z-index:15;background:var(--surf2);font-size:9px;color:var(--text3)">지표 / 구분</th>${month}</tr>
  </thead>`;
}

function renderRows(type, channel){
  const mets = activeMetrics();
  if(!mets.length) return '<tr><td colspan="999" style="padding:16px;text-align:center;color:var(--text3)">지표를 하나 이상 선택하세요</td></tr>';

  const nScen = activeScenarios.size;
  const rowsPerMet = 1 + nScen;   // 1 Actual + N scenario rows
  const rowsPerCat = mets.length * rowsPerMet;

  let html='';
  GROUP_ORDER.forEach(group=>{
    const cats = GROUP_CATS[group]||[];
    const gc = gCls(group);
    const groupRowspan = cats.length * rowsPerCat;

    cats.forEach((cat, ci)=>{
      const isTotal = TOTAL_CATS.has(cat);
      const isTotalRow = isTotal ? ' row-total' : '';
      const catLabel = (cat==='Total') ? 'Grand Total' : cat;
      const catBg = isTotal ? 'rgba(77,166,255,.06)' : 'var(--surf1)';

      mets.forEach((met, mi)=>{
        const key = dataKey(type, channel, group, cat, met.id);

        // Scenario rows to render for this metric
        const activeSList = SCENARIOS.filter(s=>activeScenarios.has(s));

        // ── ACTUAL ROW ──
        html += `<tr class="row-actual${isTotalRow}">`;

        // Col 1: Group (rowspan = all rows for this group, only first cell)
        if(ci===0 && mi===0){
          html+=`<td class="td-group ${gc}" rowspan="${groupRowspan}">${group==='Grand'?'TOTAL':group}</td>`;
        }

        // Col 2: Category (rowspan = all metric blocks for this category)
        if(mi===0){
          html+=`<td class="td-cat" rowspan="${rowsPerCat}" style="background:${catBg}">${catLabel}</td>`;
        }

        // Col 3: Metric + row-type label (rowspan = 1 Actual + N scenarios)
        const scenNames = activeSList.map(s=>s==='Most Likely'?'ML':s).join(' / ');
        html+=`<td rowspan="${rowsPerMet}" style="
          position:sticky;left:190px;z-index:3;
          background:${catBg};
          border-right:2px solid var(--border2);
          padding:2px 6px;vertical-align:top;width:80px;min-width:80px;
        ">
          <div style="font-family:var(--mono);font-size:9px;font-weight:600;color:${
            met.id==='COGS'?'var(--actual)':met.id==='Qty(Unit)'?'var(--best)':'var(--ml)'
          };padding-top:3px">${met.id==='COGS'?'COGS':met.id==='Qty(Unit)'?'Qty(Unit)':'Qty(Set)'}</div>
          <div style="font-family:var(--mono);font-size:8px;color:var(--actual);margin-top:1px">▶ Actual</div>
          ${activeSList.length?`<div style="font-family:var(--mono);font-size:8px;color:var(--text3);margin-top:1px">${scenNames}</div>`:''}
        </td>`;

        // Data cells: Actual row
        MONTHS.forEach((m,idx)=>{
          const ysep = (idx>0 && m.slice(0,4)!==MONTHS[idx-1].slice(0,4))?' yr-sep':'';
          if(isActual(m)){
            const v = getV(key, m, 'Actual');
            const display = (v!==null) ? fmt(v, met.id) : null;
            html+=`<td class="dc${ysep}">`;
            if(display!==null) html+=`<span class="vact">${display}</span>`;
            else html+=`<span class="vempty">—</span>`;
            html+=`</td>`;
          } else {
            const ev = edits[`${key}||${m}||Actual`];
            const disp = ev!==undefined ? fmt(ev, met.id) : '';
            html+=`<td class="dc editable${ysep}"><input class="inp inp-act" type="text"
              placeholder="입력" value="${disp}"
              data-key="${key}" data-m="${m}" data-s="Actual" data-met="${met.id}"
              onchange="handleEdit(this)" onfocus="this.select()"></td>`;
          }
        });
        html+=`</tr>`;

        // ── SCENARIO ROWS ──
        activeSList.forEach(scen=>{
          const inpCls = scen==='Best'?'inp-best':scen==='Most Likely'?'inp-act':'inp-worst';
          html+=`<tr class="row-scen${isTotalRow}">`;
          MONTHS.forEach((m,idx)=>{
            const ysep=(idx>0&&m.slice(0,4)!==MONTHS[idx-1].slice(0,4))?' yr-sep':'';
            if(isActual(m)){
              html+=`<td class="dc${ysep}" style="border-bottom:none;background:rgba(0,0,0,.15)"></td>`;
            } else {
              const sv = getV(key, m, scen);
              const srcDisplay = sv!==null ? fmt(sv,met.id) : '';
              const ev = edits[`${key}||${m}||${scen}`];
              const disp = ev!==undefined ? fmt(ev,met.id) : srcDisplay;
              html+=`<td class="dc editable${ysep}"><input class="inp ${inpCls}" type="text"
                placeholder="${srcDisplay||'—'}" value="${disp}"
                data-key="${key}" data-m="${m}" data-s="${scen}" data-met="${met.id}"
                onchange="handleEdit(this)" onfocus="this.select()"></td>`;
            }
          });
          html+=`</tr>`;
        });
      }); // mets
    }); // cats
  }); // groups
  return html;
}

// ============================================================
// BUILD FULL DOM
// ============================================================
function buildSections(){
  const area = document.getElementById('scroll-area');
  area.innerHTML='';

  const header = renderTableHeader();

  function makeTable(type, channel){
    return `<div class="tbl-wrap"><table>
      ${header}
      <tbody>${renderRows(type,channel)}</tbody>
    </table></div>`;
  }

  // ── SELL-IN ──
  if(topView==='all'||topView==='sellin'){
    const div=document.createElement('div');
    div.className='section-block';
    div.id='sec-sellin';
    div.innerHTML=`
      <div class="section-hd" onclick="toggleSection(this)">
        <span class="sec-tag" style="background:rgba(77,166,255,.15);color:var(--actual)">Sell-in</span>
        <span class="sec-title">Sell-in — Total</span>
        <span class="arrow">▼</span>
      </div>
      ${makeTable('Sell-in','Total')}
    `;
    area.appendChild(div);
  }

  // ── SELL-THRU ──
  if(topView==='all'||topView==='sellthru'){
    const outer=document.createElement('div');
    outer.className='section-block';
    outer.id='sec-sellthru';

    let subsHTML='';
    SELLTHRU_SUBS.forEach(sub=>{
      subsHTML+=`
        <div class="sub-section" id="sub-${sub.id}">
          <div class="sub-hd collapsed" onclick="toggleSub(this)">
            <span class="sub-tag" style="${sub.tagStyle}">${sub.label}</span>
            <span class="sub-title">Sell-thru — ${sub.label}</span>
            <span class="sub-arrow">▼</span>
          </div>
          <div class="tbl-wrap hidden">${'<table>'+header+'<tbody>'+renderRows(sub.type,sub.channel)+'</tbody></table>'}</div>
        </div>`;
    });

    outer.innerHTML=`
      <div class="section-hd" onclick="toggleSection(this)">
        <span class="sec-tag" style="background:rgba(62,207,122,.12);color:var(--best)">Sell-thru</span>
        <span class="sec-title">Sell-thru — B2C / B2B / Others / Total</span>
        <span class="arrow">▼</span>
      </div>
      <div class="tbl-wrap" id="sellthru-inner">${subsHTML}</div>
    `;
    area.appendChild(outer);
  }
}

function reRender(){ buildSections(); }

// ============================================================
// TOGGLE
// ============================================================
function toggleSection(hd){
  hd.classList.toggle('collapsed');
  const wrap = hd.nextElementSibling;
  wrap.classList.toggle('hidden');
}
function toggleSub(hd){
  hd.classList.toggle('collapsed');
  const wrap = hd.nextElementSibling;
  wrap.classList.toggle('hidden');
}

// ============================================================
// TOOLBAR HANDLERS
// ============================================================
function setTopView(v, btn){
  topView=v;
  document.querySelectorAll('#toolbar .tb-btn').forEach(b=>{
    if(['전체','Sell-in','Sell-thru'].includes(b.textContent)) b.classList.remove('on');
  });
  btn.classList.add('on');
  reRender();
}
function toggleScen(s, btn){
  if(activeScenarios.has(s)){
    if(activeScenarios.size<=1) return;
    activeScenarios.delete(s);
    btn.classList.remove('on');
  } else {
    activeScenarios.add(s);
    btn.classList.add('on');
  }
  reRender();
}

// ============================================================
// EDIT HANDLER
// ============================================================
function handleEdit(input){
  const {key, m, s, met} = input.dataset;
  const raw = input.value.trim();
  if(raw===''||raw==='—'){
    setEdit(key, m, s, null);
  } else {
    const v = parseVal(raw, met);
    if(v!==null) setEdit(key, m, s, v);
  }
}

// ============================================================
// EXPORT / RESET
// ============================================================
function exportEdits(){
  const keys = Object.keys(edits);
  if(!keys.length){ alert('입력된 값이 없습니다.'); return; }
  let text='Type\tChannel\tGroup\tCategory\tMetric\tMonth\tScenario\tValue\n';
  keys.forEach(ek=>{
    const [dataK,,month,,scenario] = ek.split('||');
    const [type,channel,group,category,metric] = dataK.split('|');
    text+=`${type}\t${channel}\t${group}\t${category}\t${metric}\t${month}\t${scenario}\t${edits[ek]}\n`;
  });
  navigator.clipboard.writeText(text).then(()=>alert(`${keys.length}개 값 복사됨`));
}
function resetEdits(){
  if(!confirm('모든 입력값을 초기화하시겠습니까?')) return;
  Object.keys(edits).forEach(k=>delete edits[k]);
  document.getElementById('editCount').textContent='수정된 셀: 0개';
  reRender();
}

// ============================================================
// INIT
// ============================================================
buildSections();
</script>
</body>
</html>
